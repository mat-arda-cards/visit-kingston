name: Ferry forecast accuracy

# Once a day, run the forecast accuracy backtest (heuristic prediction vs. the
# fullness we actually logged for each sailing) and record a snapshot, so the
# Chamber can watch the model's accuracy trend on /admin/ferry-info before
# turning the prediction feature on for visitors.
#
# Setup mirrors ferry-observe.yml: deploy the app first (the /api/ferry/accuracy
# route must exist), optionally set repo variable FERRY_OBSERVE_URL, and — if the
# app has FERRY_OBSERVE_TOKEN set — add a matching repo secret of the same name.

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily (~1 AM Pacific), after the day's data is in
  workflow_dispatch:

permissions: {}

concurrency:
  group: ferry-accuracy
  cancel-in-progress: false

jobs:
  accuracy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record an accuracy snapshot
        env:
          BASE_URL: ${{ vars.FERRY_OBSERVE_URL || 'https://explore-kingston.onrender.com' }}
          FERRY_OBSERVE_TOKEN: ${{ secrets.FERRY_OBSERVE_TOKEN }}
        run: |
          set -eo pipefail
          url="${BASE_URL%/}/api/ferry/accuracy"
          echo "POST $url"
          if [ -n "${FERRY_OBSERVE_TOKEN:-}" ]; then
            curl -fsS --max-time 60 --retry 3 --retry-delay 10 --retry-all-errors \
              -X POST -H "Authorization: Bearer ${FERRY_OBSERVE_TOKEN}" "$url"
          else
            curl -fsS --max-time 60 --retry 3 --retry-delay 10 --retry-all-errors \
              -X POST "$url"
          fi
          echo
