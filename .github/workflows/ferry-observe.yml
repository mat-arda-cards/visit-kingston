name: Log ferry observations

# Pings the app's /api/ferry/observe endpoint on a schedule so the Ferry Planner
# keeps collecting live Edmonds–Kingston sailing fullness + delay data even when
# nobody is on the site (overnight, quiet days). Each hit is throttled
# server-side (~10 min), so running more often is harmless — a deduped hit just
# returns {"ok":true,"recorded":false}.
#
# ── Setup ─────────────────────────────────────────────────────────────────────
#  1. Deploy the app WITH the /api/ferry/observe route first (Render auto-deploys
#     on push to main). Until then this workflow will 404 and fail — that red X
#     is the signal it isn't live yet.
#  2. (Optional) Point it at a different host by adding a repo *variable*
#     FERRY_OBSERVE_URL = https://your-app-host  (Settings → Secrets and
#     variables → Actions → Variables). Defaults to the Render URL below.
#  3. (Optional, recommended) If you set FERRY_OBSERVE_TOKEN as an env var on the
#     app, add a repo *secret* of the same name + value so this can authenticate.
#
# Note: GitHub disables scheduled workflows after 60 days with no repo commits;
# any push re-enables them. Scheduled runs can also be delayed under load — fine,
# the model only needs periodic samples, not exact timing.

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (UTC)
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override app base URL for a one-off manual run"
        required: false
        type: string

# Outbound HTTP only — no repository access needed.
permissions: {}

# Don't let delayed runs pile up on top of each other.
concurrency:
  group: ferry-observe
  cancel-in-progress: false

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping observe endpoint
        env:
          BASE_URL: ${{ inputs.base_url || vars.FERRY_OBSERVE_URL || 'https://explore-kingston.onrender.com' }}
          FERRY_OBSERVE_TOKEN: ${{ secrets.FERRY_OBSERVE_TOKEN }}
        run: |
          set -eo pipefail
          url="${BASE_URL%/}/api/ferry/observe"
          echo "POST $url"

          # -f fails the step on HTTP >= 400 (surfaces a bad token or an
          # undeployed route); --retry rides out transient network/5xx blips.
          # Send the bearer header only when a token secret is configured.
          if [ -n "${FERRY_OBSERVE_TOKEN:-}" ]; then
            curl -fsS --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors \
              -X POST -H "Authorization: Bearer ${FERRY_OBSERVE_TOKEN}" "$url"
          else
            curl -fsS --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors \
              -X POST "$url"
          fi
          echo
